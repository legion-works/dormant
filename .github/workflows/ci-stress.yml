      - name: Stress concurrent test binaries
        run: bash scripts/ci/run-hermeticity-stress.sh --platform Linux --stress-count 100
      - name: Upload first hermeticity process artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermeticity-stress-ubuntu-process-one
          path: target/hermeticity-stress/process-one
          if-no-files-found: warn
      - name: Upload second hermeticity process artifacts
