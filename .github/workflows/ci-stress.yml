      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo install cargo-nextest --version 0.9.131 --locked
      - name: Stress macOS real-I/O contracts
        run: |
          filter='test(rollback_boot_watches_operator_path_and_reload_recovers_without_restart)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --test boot_rollback -E "$filter")"
          printf '%s\n' "$selected"
