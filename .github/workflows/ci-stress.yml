          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --test boot_rollback --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

          filter='test(command::tests::sleep_past_timeout_errs)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormant-displays --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormant-displays --lib --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

          filter='test(wear_tracker::tests::corrupt_rename_failure_logs_wear_ledger_corrupt_not_persist_failed)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --lib --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

          filter='test(probes::usb::tests::nonexistent_port_returns_structured_failure)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormant-doctor --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormant-doctor --lib --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

  hermeticity-stress-ubuntu:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
