          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --lib --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

          filter='test(probes::usb::tests::usb_probe_decodes_a_frame_over_a_unix_pty)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormant-doctor --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormant-doctor --lib --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

          filter='test(mqtt_round_trip_publishes_presence_event)'
          selected="$(DORMANT_TEST_MQTT=1 PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormant-sensors --test mqtt_integration --run-ignored only -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          DORMANT_TEST_MQTT=1 PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormant-sensors --test mqtt_integration --run-ignored only --stress-count 100 --retries 0 --flaky-result fail -E "$filter"

  io-stress-macos:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
