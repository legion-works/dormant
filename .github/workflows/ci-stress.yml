name: CI Stress

on:
  pull_request:
    types: [opened, labeled, synchronize]

permissions:
  contents: read

jobs:
  reload-stress-ubuntu:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Mirror the ordinary test lane's reliable runner-image-drift workaround.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config libblas3 liblapack3
      # T1 evidence: docs/research/2026-07-18-nextest-ci-spike.md.
      - run: cargo install cargo-nextest --version 0.9.131 --locked
      - name: Configure nextest
        run: |
          cat > "$RUNNER_TEMP/nextest-reload-stress.toml" <<'EOF'
          [profile.default]
          retries = 0
          flaky-result = "fail"
          fail-fast = false

          [profile.default.junit]
          path = "../reload-stress/junit.xml"
          EOF
      - name: Stress config-watch reload
        run: |
          filter='test(config_watch_updates_on_successful_reload_only)'
          selected="$(cargo nextest list -p dormantd --test daemon_smoke -E "$filter")"
          printf '%s\n' "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -eq 1
          cargo nextest run --config-file "$RUNNER_TEMP/nextest-reload-stress.toml" -p dormantd --test daemon_smoke --stress-count 100 --retries 0 --flaky-result fail -E 'test(config_watch_updates_on_successful_reload_only)'
      - name: Stress manual-only reload
        run: |
          filter='test(manual_only_display_full_lifecycle_across_reload)'
          selected="$(cargo nextest list -p dormantd --test daemon_smoke -E "$filter")"
          printf '%s\n' "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -eq 1
          cargo nextest run --config-file "$RUNNER_TEMP/nextest-reload-stress.toml" -p dormantd --test daemon_smoke --stress-count 100 --retries 0 --flaky-result fail -E 'test(manual_only_display_full_lifecycle_across_reload)'
      - name: Upload reload-stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reload-stress-ubuntu
          path: target/nextest
          if-no-files-found: warn

  reload-stress-macos:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    # T1 evidence: docs/research/2026-07-18-nextest-ci-spike.md confirms this pin.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # T1 evidence: docs/research/2026-07-18-nextest-ci-spike.md.
      - run: cargo install cargo-nextest --version 0.9.131 --locked
      - name: Configure nextest
        run: |
          cat > "$RUNNER_TEMP/nextest-reload-stress.toml" <<'EOF'
          [profile.default]
          retries = 0
          flaky-result = "fail"
          fail-fast = false

          [profile.default.junit]
          path = "../reload-stress/junit.xml"
          EOF
      - name: Stress config-watch reload
        run: |
          filter='test(config_watch_updates_on_successful_reload_only)'
          selected="$(cargo nextest list -p dormantd --test daemon_smoke -E "$filter")"
          printf '%s\n' "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -eq 1
          cargo nextest run --config-file "$RUNNER_TEMP/nextest-reload-stress.toml" -p dormantd --test daemon_smoke --stress-count 100 --retries 0 --flaky-result fail -E 'test(config_watch_updates_on_successful_reload_only)'
      - name: Stress manual-only reload
        run: |
          filter='test(manual_only_display_full_lifecycle_across_reload)'
          selected="$(cargo nextest list -p dormantd --test daemon_smoke -E "$filter")"
          printf '%s\n' "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -eq 1
          cargo nextest run --config-file "$RUNNER_TEMP/nextest-reload-stress.toml" -p dormantd --test daemon_smoke --stress-count 100 --retries 0 --flaky-result fail -E 'test(manual_only_display_full_lifecycle_across_reload)'
      - name: Upload reload-stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reload-stress-macos
          path: target/nextest
          if-no-files-found: warn

  timer-stress-ubuntu:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config libblas3 liblapack3
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo install cargo-nextest --version 0.9.131 --locked
      - name: Stress audio policy virtual time
        run: |
          filter='test(audio_policy::tests::)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --lib --stress-count 500 --retries 0 --flaky-result fail -E "$filter"
      - name: Stress watchdog virtual time
        run: |
          filter='test(watchdog_schedule::tests::) or test(boot_guard::promote_tests)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --lib --stress-count 500 --retries 0 --flaky-result fail -E "$filter"
      - name: Stress wear corruption virtual time
        run: |
          filter='test(wear_tracker::tests::corrupt_rename_failure_logs_wear_ledger_corrupt_not_persist_failed)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormantd --lib -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormantd --lib --stress-count 500 --retries 0 --flaky-result fail -E "$filter"
      - name: Stress rules virtual time
        run: |
          filter='test(clear_grace_blank_then_instant_wake) or test(motion_sensor_hold_time_stretches_pulse) or test(wake_failure_retries_until_success) or test(set_inhibited_freezes_grace_until_released) or test(render_ladder_dwell_advances_to_controller_blank)'
          selected="$(PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest list -p dormant-core --test rules_end_to_end -E "$filter")"
          printf '%s\n' "$selected"
          test -n "$selected"
          test "$(printf '%s\n' "$selected" | wc -l)" -ge 1
          PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo nextest run -p dormant-core --test rules_end_to_end --stress-count 500 --retries 0 --flaky-result fail -E "$filter"

  timer-stress-macos:
    if: contains(github.event.pull_request.labels.*.name, 'ci-stress-reload')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo install cargo-nextest --version 0.9.131 --locked
      - name: Stress audio policy virtual time
        run: |
