name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  webui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/dormant-web/webui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/dormant-web/webui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run
      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: crates/dormant-web/webui/dist/

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic

  test:
    needs: webui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: crates/dormant-web/webui/dist/
      - run: cargo test --workspace --all-features

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config ffmpeg libavcodec-extra
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo build -p dormant-render
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo build -p dormantd --features render
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo test -p dormant-core --features render
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo test -p dormantd --features render
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo test -p dormant-render

  portability:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: cargo check --workspace

  mqtt-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - name: Start Mosquitto broker
        run: |
          docker run -d --name mosquitto -p 1883:1883 eclipse-mosquitto:2 mosquitto -c /mosquitto-no-auth.conf
          for _ in $(seq 1 10); do nc -z localhost 1883 && break; sleep 1; done
      - run: DORMANT_TEST_MQTT=1 cargo test -p dormant-sensors -- --ignored mqtt_round_trip_publishes_presence_event

  docs:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: cargo doc --workspace --no-deps

  mdbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - run: mdbook build docs

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: uncenter/setup-taplo@v1
      - run: taplo fmt --check

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  pr-title:
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
