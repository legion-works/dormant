name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    # `edited` so a PR-title-only fix re-triggers the pr-title conventional-commit
    # lint (default types omit it, leaving a retitle unable to clear a red check).
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: bash scripts/gates/fmt.sh

  webui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/dormant-web/webui/package-lock.json
      - run: npm ci
        working-directory: crates/dormant-web/webui
      - run: bash scripts/gates/webui.sh

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: bash scripts/gates/clippy.sh

  test:
    # No `needs: webui`: the Rust suite only asserts the SPA fallback serves
    # text/html, which the checked-in placeholder index.html already satisfies
    # (real-SPA coverage is the webui job's vitest + deploy-time checks). Serial
    # dependency + artifact download was pure latency on the critical path.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Plain apt-get, NOT cache-apt-pkgs-action: the cache action failed two
      # distinct ways under runner-image drift (cache hit restores listed
      # packages without dependency resolution → libblas.so.3 missing at test
      # runtime; cache miss's fresh-install path left dev-lib symlinks broken →
      # rust-lld cannot find -ludev/-lmpv). The ~40s apt cost is the reliable
      # price. libblas3/liblapack3 stay explicit: runtime deps of the
      # libmpv/ffmpeg stack the runner image no longer preinstalls.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config libblas3 liblapack3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.131
      - run: bash scripts/gates/rust-tests.sh
      - name: Classify nextest JUnit
        if: always()
        run: python3 scripts/ci/classify_nextest_junit.py target/nextest/ci/junit.xml
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-test
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Plain apt-get — see the test job's note on the cache action's two
      # failure modes under runner-image drift.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev libmpv-dev pkg-config ffmpeg libavcodec-extra libblas3 liblapack3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.131
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo build -p dormantd --features render
      # dormant-render has no `render` feature (it IS the impl crate — always
      # built); dormant-core/dormantd gate it. Run the feature-gated pair and
      # the bare render crate together under nextest.
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo-nextest ntr --profile ci -p dormant-core -p dormantd -p dormant-render --features render
      - run: PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo test -p dormant-core -p dormantd --features render --doc
      - name: Classify nextest JUnit
        if: always()
        run: python3 scripts/ci/classify_nextest_junit.py target/nextest/ci/junit.xml
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-render
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  windows-portability:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  macos-test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.131
      - run: bash scripts/gates/rust-tests.sh
      - run: cargo test --manifest-path vendor/ddc-macos/Cargo.toml
      - name: Classify nextest JUnit
        if: always()
        run: python3 scripts/ci/classify_nextest_junit.py target/nextest/ci/junit.xml
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-macos-14
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  macos-msrv:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo check --manifest-path vendor/ddc-macos/Cargo.toml --all-targets

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # The standalone `audit` job (rustsec/audit-check, ~180s) was dropped: it
  # queried the same RustSec advisory DB that `cargo deny check` already
  # covers via deny.toml's [advisories] section (~29s). Redundant coverage,
  # no wall-clock benefit (it ran in parallel), pure runner-minute cost.

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: bash scripts/gates/msrv.sh

  mqtt-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev mosquitto-clients
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.131
      - name: Start Mosquitto broker
        run: |
          docker run -d --name mosquitto -p 127.0.0.1::1883 eclipse-mosquitto:2 mosquitto -c /mosquitto-no-auth.conf
          port="$(docker port mosquitto 1883/tcp | awk -F: '{print $NF}')"
          printf 'DORMANT_TEST_MQTT_PORT=%s\n' "$port" >> "$GITHUB_ENV"
          bash scripts/ci/wait-for-mqtt.sh 127.0.0.1 "$port" 10
      - run: DORMANT_TEST_MQTT=1 PKG_CONFIG_PATH=/usr/lib/pkgconfig cargo-nextest ntr --profile ci -p dormant-sensors --test mqtt_integration --run-ignored only -E 'test(#*mqtt_*)'
      - name: Classify nextest JUnit
        if: always()
        run: python3 scripts/ci/classify_nextest_junit.py target/nextest/ci/junit.xml
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-mqtt
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - run: bash scripts/gates/rustdoc.sh

  mdbook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.4.52
      - run: bash scripts/gates/mdbook.sh

  taplo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli@0.10.0
      - run: bash scripts/gates/taplo.sh

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          echo "fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e  /tmp/gitleaks.tar.gz" \
            > /tmp/gitleaks.sha256
          sha256sum -c /tmp/gitleaks.sha256
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin/ gitleaks
          chmod +x /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: bash scripts/gates/gitleaks.sh history

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  pr-title:
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libudev-dev libwayland-dev
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.131
      - run: python3 scripts/ci/verify_nextest_policy.py --nextest-version 0.9.131
      - run: python3 scripts/ci/check_flake_ledger.py .github/flake-ledger.toml
      - run: python3 scripts/ci/check_gate_parity.py --ci .github/workflows/ci.yml --lefthook lefthook.yml --manifest scripts/gates/parity.txt
      - run: python3 -m unittest discover -s scripts/ci/tests -p 'test_*.py'
