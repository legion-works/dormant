name: Release artifact smoke test
#
# Reusable workflow wired into release.yml's `global-artifacts-jobs` custom
# job hook (see dist-workspace.toml). dist adds the calling job
# (`custom-release-artifact-smoke`) to `host`'s `needs` and success predicate
# for us, so a failure here blocks `host` from creating/publishing the
# GitHub release. Do not hand-edit that wiring in release.yml directly —
# rerun `dist generate` after changing this file or the dist-workspace.toml
# config instead (see .github/workflows/release.yml's autogenerated header).
#
# This job proves packaged archive integrity and dynamic-link startup
# (`--version`, `--help`, `--validate-only`) on three of the four targets
# dist builds — Linux x86_64 and, since Task 12, macOS arm64/x86_64 (the
# plist is additionally `plutil -lint`ed on the two *-apple-darwin legs).
# aarch64-unknown-linux-gnu is built by dist but has never had a smoke leg
# (no arm64 Linux runner wired up; pre-existing gap, left explicit). It never
# runs the daemon for real and never invokes the shell installer (which
# would try to curl a release that doesn't exist yet at this point in the
# pipeline).

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  release-artifact-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin
          - os: macos-15-intel
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      PLAN: ${{ inputs.plan }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Smoke-test packaged dormantd / dormantctl (${{ matrix.triple }})
        run: |
          echo "$PLAN" > "$RUNNER_TEMP/dist-manifest.json"
          bash .github/scripts/smoke-release-artifacts.sh \
            "$RUNNER_TEMP/dist-manifest.json" \
            target/distrib/ \
            ${{ matrix.triple }}
