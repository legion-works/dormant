<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="dormant mark">
  <defs>
    <filter id="dmGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <mask id="dmCrescent">
      <rect width="32" height="32" fill="black"></rect>
      <circle cx="16" cy="16" r="12.5" fill="white"></circle>
      <circle cx="21.5" cy="12.5" r="10.5" fill="black"></circle>
    </mask>
  </defs>
  <rect width="32" height="32" fill="#C3E88D" mask="url(#dmCrescent)" filter="url(#dmGlow)"></rect>
  <circle cx="11" cy="19" r="1.7" fill="#86E1FC"></circle>
</svg>