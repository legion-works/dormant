[graph]
# cargo-deny v2 schema — graph section is required but can be minimal

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  # ksni (dormant-tray's StatusNotifierItem library) is Unlicensed —
  # the maintainer placed it under the Unlicense; OSI-approved, FSF
  # Free/Libre.  Allowed because it's source-only consumption from us.
  "Unlicense",
  # slotmap (transitive via fontdb → usvg → resvg → dormant-tray
  # build-dep) ships under the zlib license.  Build-time codegen only;
  # not linked into the tray binary.
  "Zlib",
]
# libmpv2 / libmpv2-sys declare license = "LGPL-2.1", which is a
# deprecated SPDX expression in SPDX-3; cargo-deny's license parser
# flags them as parse-errors and can't classify the crate against the
# allow list.  The crates are LGPL-2.1 (equivalent to LGPL-2.1-only);
# pinning the exception by crate name is the documented workaround for
# unfixable upstream metadata.
[[licenses.exceptions]]
crate = "libmpv2"
allow = ["LGPL-2.1"]

[[licenses.exceptions]]
crate = "libmpv2-sys"
allow = ["LGPL-2.1"]

[bans]
# "wildcards" are semver-minimum specs like "2" (≥2.0.0) — standard Cargo practice
wildcards = "allow"
# multiple versions of transitive deps are normal in Rust; warn but don't block
multiple-versions = "warn"

[advisories]
# vulnerability, unsound, notice, yanked are always errors in cargo-deny v2
unmaintained = "workspace"
ignore = [
  # rustls-webpki vulns — rumqttc v0.24 pins 0.102.x; fix requires rumqttc upgrade
  "RUSTSEC-2026-0049",
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  "RUSTSEC-2026-0104",
  # serde_yaml recursion — ddc-hi pins 0.7.x via mccs-db (parses the bundled
  # MCCS capability database shipped in the crate, not user/network input);
  # dormant's own config format is TOML
  "RUSTSEC-2018-0005",
  # quick-xml DOS vulns — wayland-scanner v0.31 pins quick-xml ^0.39; these are
  # build-time codegen only (proc-macro), no runtime parse of untrusted XML
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]
