[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# GNU, not musl: zbus (DBus) and libudev make static musl builds painful.
# Darwin/Windows targets excluded — dormant uses Linux-specific facilities
# (KWin DBus, DDC/CI via /dev/i2c, udev, Wayland/X11 DPMS).
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Generate checksums for release artifacts
checksums = true
# Build with the web UI embedded. The release CI must build the frontend
# dist before the Rust build so rust-embed can bundle the real SPA.
# The github-build-setup snippet handles Node + npm ci + npm run build.
features = ["web-ui"]
all-features = false
github-build-setup = ".github/dist-build-setup.yml"
