# Example dormant configuration.
#
# Install to $XDG_CONFIG_HOME/dormant/config.toml (usually
# ~/.config/dormant/config.toml) or /etc/dormant/config.toml, and keep secrets
# in a sibling credentials.toml (mode 0600).
#
# Validate before running. Credentials must be mode 0600, so copy the example
# out and tighten it first (a file tracked in git can't carry 0600 reliably):
#   cp examples/credentials.toml /tmp/creds.toml && chmod 600 /tmp/creds.toml
#   dormantd --validate-only --config examples/config.toml \
#            --credentials /tmp/creds.toml
#
# --validate-only also tolerates a missing credentials file (it falls back to
# empty credentials and reports any resulting "missing credential" errors), so
# a bare `dormantd --validate-only --config examples/config.toml` still runs.
#
# This example uses only the controllers registered today (command, ddcci,
# ha-passthrough) and the sensor types available today (mqtt, ha, usb-ld2410).
# Native kwin-dpms and samsung-tizen controllers land in later tasks; until
# then a shell `command` controller or `ha-passthrough` covers those displays.

config_version = 1

# ── OLED health (panel-wear tracking) ───────────────────────────────────────
#
# Optional: brightness-weighted on-hours tracking + a compensation advisory
# in the web UI. Local-only measurement, no enforcement — see
# docs/src/oled-health.md for what is (and is not) tracked. Enabled by
# default; every key below shows its default, so this section can be
# omitted entirely.
# [wear]
# enabled = true                 # kill-switch; false = tracker parks (no ledger I/O, no panel reads)
# sample_interval = "60s"        # how often to sample panel brightness (>= 5s)
# persist_interval = "5m"        # how often to write ledgers to disk (>= sample_interval)
# read_timeout = "2s"            # per-sample read budget; never blocks a blank/wake (>= 500ms)
# grid_rows = 9                  # logical wear-grid rows (4..=64; v1 attributes uniformly, see docs)
# grid_cols = 16                 # logical wear-grid columns (4..=64)
# fallback_brightness = 0.5      # assumed brightness when a real panel read fails (0.0..=1.0)
# screensaver_factor = 0.35      # attribution discount while on the render_screensaver stage (0.0..=1.0)
# short_cycle_dwell = "10m"      # blanked dwell long enough to count as a "rest" window (>= 1m)
# advisory_after = "96h"         # advise when no qualifying rest window for this long (>= 1h)

# ── Failure notifications ───────────────────────────────────────────────────
#
# Optional: desktop notifications (freedesktop D-Bus, session bus only) when
# a wake command fails repeatedly or a blank command exhausts its controller
# chain, plus a recovery notice when it clears. The tray icon's Failure
# state and the web dashboard's failure banner are unaffected by this
# section — they always reflect the live failure state. See
# docs/src/failure-notifications.md. Enabled by default; every key below
# shows its default, so this section can be omitted entirely.
# [notifications]
# enabled = true                  # kill-switch; false = no notifier task, no D-Bus I/O
# wake_attempt_threshold = 3       # consecutive wake failures before notifying (>= 1)
# cooldown = "15m"                 # minimum time between repeat notices per display (>= 1m)
# notify_recovery = true           # send a Normal-urgency notice when a failing display recovers

# ── Watchdog and rollback ────────────────────────────────────────────────────
#
# Optional: last-known-good (LKG) config snapshotting, boot-time rollback on
# a bad config or a crash/wedge loop, and systemd watchdog pings (Type=notify
# unit only — see crates/dormantd/systemd/dormant.service). See
# docs/src/watchdog-rollback.md. Enabled by default; every key below shows
# its default, so this section can be omitted entirely. WatchdogSec and ping
# cadence are NOT config here — they come from systemd's own environment.
# [watchdog]
# lkg_enabled = true           # last-known-good snapshotting + boot rollback
# lkg_rollback_enabled = true  # counted crash-loop rollback; disable during rapid restart debugging
# stability_window = "5m"      # healthy runtime before a config is promoted to LKG (>= 30s)

# ── Multi-machine coordination ──────────────────────────────────────────────
# [coordination]
# enabled = true                # mDNS discovery, pairing, and operator routes
# poll_interval = "2s"          # shared-display ownership poll cadence (>= 1s)

# ── Audio- and call-aware blanking (PipeWire) ───────────────────────────────
#
# Optional, global (one PipeWire instance, one poller — unlike the per-rule
# activity_* settings): polls pw_dump_command for the running PipeWire graph
# and lets rules opt into "audio-playback" / "call" inhibitors via their own
# `inhibitors` list. See docs/src/configuration.md's `[audio]` section,
# including the capture_is_call false-positive warning. Enabled by default
# (schema-wise); every key below shows its default, so this section can be
# omitted entirely — but no rule inhibits on audio/call unless it lists
# "audio-playback"/"call" in `inhibitors`.
# [audio]
# poll_interval = "5s"                    # how often to invoke pw_dump_command (>= 1s)
# min_active = "3s"                       # continuous activity required before asserting (<= 10x poll_interval)
# call_roles = ["Communication"]          # media.role values that mean "this running stream is a call"
# playback_roles = ["Movie", "Music"]     # unset (default) = every non-call running output stream inhibits; [] is rejected
# capture_is_call = false                 # opt-in: a running microphone counts as a call — see the false-positive warning in the docs
# pw_dump_command = "pw-dump"             # override = the test/fake-script seam; whitespace-split argv, no shell, no quoting

[daemon]
startup_holdoff = "20s"
stale_sensor_timeout = "5m"
log_level = "info"
socket_path = "/run/user/1000/dormant.sock"

# idle_source: "auto" (default) | "wayland" | "dbus" | "macos"
# "macos" selects the CoreGraphics idle-time source (macOS builds only —
# see the macos_idle_* keys below, which tune that source's noise handling).
# idle_source = "auto"
#
# macos_idle_frozen_polls = 3    # consecutive identical-looking polls before a reading is
#                                 # treated as "frozen" rather than genuine idleness (>= 2)
# macos_idle_sanity_cap = "24h"  # readings above this are treated as bogus, not real idle time (> 0)
# macos_idle_startup_grace = "15s"  # readings are untrusted for this long after daemon startup (> 0)

# ── Web UI config editor: entity CRUD + the Samsung pairing wizard ─────────
#
# Only relevant when the web UI is enabled (daemon.web_port set, see
# docs/src/web-ui.md). Both default to on; set to false to hide/reject the
# corresponding affordance without disabling the rest of the web UI. The
# server enforces these independently of what the UI shows — flipping a
# switch off returns 403 "feature_disabled" for the gated routes, not just
# a hidden button.
# entity_crud_enabled = true     # web create/delete of sensors/zones/displays/rules
# pairing_enabled = true         # the Samsung pairing wizard (POST /api/pair/samsung)
# pair_timeout = "120s"          # how long the wizard waits for the TV to accept (30s..=300s)

# ── Sensors ────────────────────────────────────────────────────────────────────

# Desk occupancy over MQTT (e.g. an ESPresence / mmWave node publishing JSON).
[sensors.desk]
type = "mqtt"
broker_url = "tcp://localhost:1883"
topic = "dormant/desk/occupancy"
field = "/occupancy"
# Availability (LWT) — optional. Defaults assume the Zigbee2MQTT convention:
# topic "<topic>/availability" with payloads "online"/"offline". Override for
# other conventions, e.g. Tasmota's LWT topic with literal Online/Offline:
# availability_topic = "tele/desk/LWT"
# availability_payload_online = "Online"
# availability_payload_offline = "Offline"
# See docs/src/sensors.md#retained-values-and-availability for the retained-
# message semantics, the Zigbee2MQTT per-device "retain" setting operators
# need to enable, and why `unavailable_policy = "absent"` is unsafe with MQTT
# until you've verified your bridge republishes state on availability recovery.

# Couch presence via Home Assistant (requires ha_token in credentials.toml).
[sensors.couch]
type = "ha"
url = "ws://homeassistant.local:8123/api/websocket"
entity = "binary_sensor.couch_presence"

# Hallway radar over USB — motion, with a hold time so brief pulses persist.
[sensors.hallway]
type = "usb-ld2410"
port = "/dev/ttyUSB0"
kind = "motion"
hold_time = "30s"

# ── Zones ──────────────────────────────────────────────────────────────────────

# The office is occupied if either the desk sensor or the hallway radar fires.
[zones.office]
mode = "any"
members = ["desk", "hallway"]

# The living room follows the couch sensor alone.
[zones.living_room]
mode = "any"
members = ["couch"]

# ── Displays ───────────────────────────────────────────────────────────────────

# Main monitor: DDC/CI brightness-to-zero, falling back to a shell command if
# the panel's DDC channel is flaky.
[displays.main_monitor]
controllers = ["ddcci", "command"]
blank_mode = "brightness_zero"
degraded_mode = "power_off"
ddc_display = "DP-1"
blank_command = "ddcutil --display 1 setvcp 10 0"
wake_command = "ddcutil --display 1 setvcp 10 80"
modes = ["brightness_zero", "power_off"]
command_timeout = "8s"
# panel_type = "qd-oled"        # optional: "woled" | "qd-oled" | "unknown" (default).
#                                # Config-declared only — never auto-detected — and, in
#                                # v1, recorded in the wear ledger but not yet consulted
#                                # by any attribution heuristic (see docs/src/oled-health.md).

# TV driven through Home Assistant service calls.
[displays.tv]
controllers = ["ha-passthrough"]
blank_mode = "power_off"
ha_url = "http://homeassistant.local:8123"
blank_service = "media_player.turn_off"
blank_data = { entity_id = "media_player.living_room_tv" }
wake_service = "media_player.turn_on"
wake_data = { entity_id = "media_player.living_room_tv" }
modes = ["power_off"]

# macOS example: DDC/CI first, falling back to the audio-safe Quartz
# gamma-black controller, falling back to the whole-machine `pmset`
# display-sleep controller as the last resort. This is the plan-recommended
# chain order for a macOS host — see docs/src/displays.md#recommended-macos-chain.
# `ddcci` and `macos-gamma-black` read DIFFERENT selector fields: `ddcci`
# uses `ddc_display` (a matcher; unset auto-selects the single detected
# DDC/CI display), `macos-gamma-black` requires `output = "cg:<uuid>"` (the
# CoreGraphics display UUID — read one from `dormantctl doctor
# macos-display-sleep`'s output). The trailing `macos-display-sleep`
# controller is global and ignores `output` entirely (must be absent or the
# literal "all" — it has no per-display selector).
# [displays.oled_mac]
# controllers = ["ddcci", "macos-gamma-black", "macos-display-sleep"]
# blank_mode = "brightness_zero"
# output = "cg:37d8832a-2d66-02ca-b9f7-8f30a301b230"
# modes = ["brightness_zero", "power_off"]

# Desktop monitor with a render ladder: blank the panel via DDC/CI, then
# switch to a black software overlay, and finally show a screensaver of
# local images if the room stays vacant.  Requires `--features render`.
# [displays.desktop]
# controllers = ["ddcci"]
# output = "DP-1"
# ladder = [
#   { kind = "power_off", dwell = "30s" },
#   { kind = "render_black", dwell = "5m" },
#   { kind = "render_screensaver" },
# ]
# [displays.desktop.screensaver]
# trigger = "vacancy"
# audio = false
# # scale_mode — how source frames are mapped onto the rendered rectangle.
# # "fill" (default) crops to fill (no black bars; OS-screensaver norm).
# # "fit" preserves aspect with black bars (legacy behaviour).
# # "stretch" fills the rectangle but distorts aspect.
# # "center" shows the source at native pixel size, centred.
# scale_mode = "fill"
# # transition — how successive playlist items transition.
# # "crossfade" (default) blends frames with a per-pixel u8 lerp over
# # transition_duration; measured ≈0.9 ms/frame at 3072×1728.
# # "none" cuts immediately (the pre-M3 behaviour; useful for
# # benchmarks or operators who want the legacy look).
# transition = "crossfade"
# # transition_duration — length of the crossfade blend (ignored when
# # transition = "none").  Humantime string; bounded 100ms..=10s by the
# # validator.  Default: "1s".
# transition_duration = "500ms"
# # shift_px / shift_interval — periodic micro pixel-shift on the screensaver
# # surface only, to even out static-image burn-in. The black overlay never
# # shifts (U5): a uniform black field is translation-invariant on OLED.
# # shift_px is in buffer pixels (a fractional output scale multiplies the
# # physical step). shift_px = 0 disables.
# shift_px = 2                   # pixels per shift, 0..=8 (default 2)
# shift_interval = "120s"        # time between shifts, >= 10s (default "120s")
# [[displays.desktop.screensaver.source]]
# path = "/home/user/Pictures/screensaver"
# recurse = false
# shuffle = true
# image_duration = "8s"
# [[displays.desktop.screensaver.source]]
# urls = ["https://example.com/background.jpg"]
# order = "sequential"

# ── Rules ──────────────────────────────────────────────────────────────────────

# Blank the main monitor when the office empties; respect user activity so the
# screen never blanks while you are actively typing.
[rules.desk]
zone = "office"
displays = ["main_monitor"]
grace_period = "45s"
min_wake_time = "10s"
inhibitors = ["user-activity"]
activity_idle_threshold = "2m"
activity_poll_interval = "5s"

# Turn the TV off shortly after the living room clears.
[rules.living_room]
zone = "living_room"
displays = ["tv"]
grace_period = "2m"
wake_retries = 2
wake_retry_backoff = "2s"
wake_retry_interval = "60s"
# A display shared with another dormant machine needs a controller that can
# read its active input and this machine's input-source code.
# [displays.shared_oled]
# controllers = ["ddcci"]
# blank_mode = "power_off"
# scope = "shared"
# shared_input_code = 0x0f       # doctor prints the active input in hex
