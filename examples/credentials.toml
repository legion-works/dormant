# Example dormant credentials.
#
# Secrets referenced by config.toml live here so the main config can be shared
# or version-controlled without leaking tokens.
#
# This file MUST be owned by you and mode 0600 — dormantd refuses to read it
# otherwise:
#
#   install -m 600 examples/credentials.toml \
#     ~/.config/dormant/credentials.toml
#   # or, for an existing file:
#   chmod 600 ~/.config/dormant/credentials.toml

# Home Assistant long-lived access token (Profile → Security → Long-lived
# access tokens). Required by any `ha` sensor or `ha-passthrough` display.
ha_token = "REPLACE_WITH_HOME_ASSISTANT_LONG_LIVED_TOKEN"

# Samsung Tizen TV tokens, keyed by host — used by the samsung-tizen controller
# (lands in a later task). Safe to leave empty until then.
[samsung]
# "192.168.1.50" = "REPLACE_WITH_TV_TOKEN"

# MQTT broker credentials, keyed by broker URL.  The key MUST match the sensor's
# broker_url in config.toml EXACTLY — same scheme (mqtt:// vs tcp://), same
# trailing detail.  A mismatch silently misses the lookup (anonymous connect →
# auth failure).
[mqtt]
# "mqtt://192.0.2.5:1883" = { username = "my-user", password = "my-password" }
