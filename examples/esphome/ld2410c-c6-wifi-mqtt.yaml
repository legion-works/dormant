# Reference config — verify component options against your ESPHome version.
#
# HLK-LD2410C 24GHz mmWave presence sensor on ESP32-C6 with WiFi + MQTT.
# Publishes occupancy binary_sensors over MQTT; dormant consumes the
# `desk_near` (or `has_target`) topic via its MQTT sensor source.
#
# This is one of two supported topologies for the same radar (see
# docs/src/sensors.md "Two ways to wire the LD2410C"): the ESP carries the
# radar over WiFi so it can live anywhere with power. The other topology wires
# the radar straight into the host with a USB-serial adapter (type =
# "usb-ld2410") and needs no ESP at all.
#
# Wiring (5 pins, JST 1.25mm on sensor side):
#   Sensor VCC → board 5V     (NOT 3V3 — the radar browns out at 3.3V)
#   Sensor GND → board GND
#   Sensor TX  → board RX  (rx_pin below)
#   Sensor RX  → board TX  (tx_pin below)
#   Sensor OUT → unused (digital presence pin; UART carries richer data)
#
# UART pins vary by board — set rx_pin/tx_pin to the GPIOs you actually wired
# and confirm they are free (not USB/strapping pins). This example uses the
# ESP32-C6 SuperMini (GPIO19/GPIO20; native USB is GPIO12/13, BOOT is GPIO9).
# The DevKitC-1 / DevKitM-1 commonly break out GPIO4/GPIO5 instead.

substitutions:
  device_name: ld2410c-desk
  friendly_name: "Desk Presence"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: "2025.12.0"

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # mmWave presence wants low latency; default modem power-save adds seconds.
  power_save_mode: none

  ap:
    ssid: ${device_name}-fallback
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  # If Home Assistant already gets this device over the native API above,
  # leave discovery off so HA doesn't add a duplicate MQTT copy. Set it true
  # for an MQTT-only setup (and drop the api: block).
  discovery: false
  # retain: true on both so a late subscriber (dormant restarting) reads true
  # availability instead of a stale value — the sensor's fail-safe hinges on it.
  birth_message:
    topic: ${device_name}/status
    payload: online
    retain: true
  will_message:
    topic: ${device_name}/status
    payload: offline
    retain: true

uart:
  tx_pin: GPIO20
  rx_pin: GPIO19
  baud_rate: 256000

ld2410:

binary_sensor:
  - platform: ld2410
    has_target:
      id: has_tgt
      name: "${friendly_name} Occupancy"
      device_class: occupancy
    has_moving_target:
      name: "${friendly_name} Moving"
      device_class: motion
    has_still_target:
      name: "${friendly_name} Still"
      device_class: occupancy

  # 1D distance zones: a radial partition at a runtime-tunable cutoff. The
  # LD2410C reports one target along a single axis (distance), so it cannot do
  # 2D X/Y zones like an LD2450 — but near/far is most of the value for a desk.
  # raw_state bypasses the MQTT throttle filter so zone edges react instantly.
  - platform: template
    name: "${friendly_name} Desk Near"
    device_class: occupancy
    lambda: |-
      if (!id(has_tgt).state) return false;
      if (std::isnan(id(det_dist).raw_state)) return false;
      return id(det_dist).raw_state <= id(near_cutoff).state * 100.0f;
    filters:
      - delayed_off: 5s
  - platform: template
    name: "${friendly_name} Room Far"
    device_class: occupancy
    lambda: |-
      if (!id(has_tgt).state) return false;
      if (std::isnan(id(det_dist).raw_state)) return false;
      return id(det_dist).raw_state > id(near_cutoff).state * 100.0f;
    filters:
      - delayed_off: 5s

# Diagnostic/tuning sensors — throttled so MQTT traffic stays sane.
sensor:
  - platform: ld2410
    detection_distance:
      id: det_dist
      name: "${friendly_name} Detection Distance"
      filters: [throttle: 10s]
    moving_energy:
      name: "${friendly_name} Moving Energy"
      filters: [throttle: 10s]
    still_energy:
      name: "${friendly_name} Still Energy"
      filters: [throttle: 10s]
    moving_distance:
      name: "${friendly_name} Moving Distance"
      filters: [throttle: 10s]
    still_distance:
      name: "${friendly_name} Still Distance"
      filters: [throttle: 10s]

# Runtime tuning: detection-bubble shaping + zone cutoff, all adjustable from
# Home Assistant without reflashing.
number:
  - platform: ld2410
    timeout:
      name: "${friendly_name} Radar Timeout"
    max_move_distance_gate:
      name: "${friendly_name} Max Move Gate"
    max_still_distance_gate:
      name: "${friendly_name} Max Still Gate"
  - platform: template
    name: "${friendly_name} Near Cutoff"
    id: near_cutoff
    icon: mdi:arrow-expand-horizontal
    entity_category: config
    unit_of_measurement: m
    min_value: 0.5
    max_value: 6.0
    step: 0.25
    initial_value: 2.5
    optimistic: true
    restore_value: true
